openapi: "3.1.0"
info:
  title: 3GPP Server API
  description: |
    A JSON-to-NGAP/NAS translation server for conformance testing, fuzzing,
    and security assessment of 5G core networks.

    The server manages gNB and UE contexts, translates JSON requests into
    NGAP/NAS messages over SCTP, and returns decoded responses as JSON.

    ## Workflow

    1. **Create a gNB** — dials SCTP to the AMF, performs NG Setup.
    2. **Create a UE** — provisions credentials (K, OPc), computes SUCI.
    3. **Send NGAP messages** — builds NAS inside NGAP, sends over SCTP,
       returns the decoded AMF response.

    ## IE Control

    The JSON schema mirrors NGAP/NAS IEs 1:1. Every optional IE can be
    individually set, overridden, or omitted — enabling both correct
    procedures and deliberate deviations for fuzz testing.

    ## 3GPP References

    - NGAP: TS 38.413
    - NAS 5GS: TS 24.501
    - 5G Security: TS 33.501
  version: "0.2.0"
  license:
    name: BUSL-1.1
    identifier: BUSL-1.1

paths:
  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: Get OpenAPI specification
      description: Returns this OpenAPI specification document.
      responses:
        "200":
          description: OpenAPI YAML document
          content:
            application/openapi+yaml:
              schema:
                type: string

  /gnb:
    post:
      operationId: createGNB
      summary: Create gNB
      description: |
        Dials SCTP to the AMF, sends an NGSetupRequest, and returns the
        NGSetupResponse or NGSetupFailure.

        Use `ng_setup_ies` to send a hand-crafted IE list instead of
        auto-building from the top-level fields. Set `skip_ng_setup` to open the
        association without NG Setup (no NGSetupResponse is returned).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGNBRequest"
      responses:
        "201":
          description: gNB created and NG Setup completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGNBResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"

  /gnb/{gnb_id}:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    get:
      operationId: getGNB
      summary: Get gNB state
      responses:
        "200":
          description: gNB state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GNBStateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGNB
      summary: Delete gNB
      description: Closes the SCTP connection and removes the gNB.
      responses:
        "204":
          description: gNB deleted.
        "404":
          $ref: "#/components/responses/NotFound"

  /enb:
    post:
      operationId: createENB
      summary: Create eNB
      description: |
        Dials SCTP to the MME on S1-MME (PPID 18), sends an S1 Setup Request, and
        returns the S1 Setup Response or S1 Setup Failure (TS 36.413 §8.7).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateENBRequest"
      responses:
        "201":
          description: eNB created and S1 Setup completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateENBResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "502":
          $ref: "#/components/responses/BadGateway"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    get:
      operationId: getENB
      summary: Get eNB state
      responses:
        "200":
          description: eNB state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ENBStateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteENB
      summary: Delete eNB
      description: Closes the SCTP connection and removes the eNB.
      responses:
        "204":
          description: eNB deleted.
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/ue:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    post:
      operationId: createENBUE
      summary: Create UE on an eNB
      description: |
        Creates an EPS UE context with subscriber credentials (IMSI, K, OPc) and
        allocates an eNB UE S1AP ID. NAS keys are derived per attach step.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateENBUERequest"
      responses:
        "201":
          description: UE created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateENBUEResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/ue/{ue_id}/s1ap:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: sendENBNAS
      summary: Drive one EPS NAS procedure step or a source-eNB S1AP message
      description: |
        Sends one uplink message from the emulated UE over S1AP and returns the
        MME's reply decoded as JSON. `message_type` selects the message. EPS-AKA
        and NAS keys are computed independently, so a returned `mac_verified`
        reflects the MME's NAS-MAC checked under those keys.

        **Does NOT auto-respond** — the caller controls the entire flow.

        ## EMM procedures (TS 24.301 §5)

        - `attach_request` — ATTACH REQUEST inside an Initial UE Message.
        - `authentication_response` — Computes EPS-AKA RES from the stored
          RAND/AUTN and sends AUTHENTICATION RESPONSE.
        - `authentication_failure` — AUTHENTICATION FAILURE with the EMM `cause`
          (TS 24.301 §5.4.2.6); #21 synch failure auto-includes the AUTS.
        - `identity_response` — IDENTITY RESPONSE carrying the requested identity.
        - `security_mode_complete` — Derives the NAS keys and sends SECURITY MODE
          COMPLETE (integrity-protected and ciphered).
        - `security_mode_reject` — SECURITY MODE REJECT with the EMM `cause`,
          sent unprotected (TS 24.301 §5.4.3.5).
        - `attach_complete` — INITIAL CONTEXT SETUP RESPONSE followed by ATTACH
          COMPLETE.
        - `service_request` — SERVICE REQUEST, moving the UE out of ECM-IDLE.
        - `tracking_area_update` — TRACKING AREA UPDATE REQUEST.
        - `detach_request` — UE-originating DETACH REQUEST; with `switch_off` the
          MME sends no Detach Accept.

        ## ESM procedures (TS 24.301 §6)

        - `pdn_connectivity` — PDN CONNECTIVITY REQUEST for an additional PDN
          connection to `apn`. With `withhold_accept` the tester never sends the
          bearer accept, leaving T3485 to retransmit (TS 24.301 §6.4.1.6 a).
        - `pdn_disconnect` — PDN DISCONNECT REQUEST for the PDN connection whose
          linked default bearer is `linked_ebi`. With `withhold_accept` the tester
          never sends the deactivate accept, leaving T3495 to retransmit
          (TS 24.301 §6.4.4.5 a).
        - `bearer_resource_allocation_request` — BEARER RESOURCE ALLOCATION REQUEST
          with the given `pti` (TS 24.301 §8.3.8). Send-only.
        - `bearer_resource_modification_request` — BEARER RESOURCE MODIFICATION
          REQUEST with the given `pti` (TS 24.301 §8.3.10). Send-only.
        - `esm_information_response` — ESM INFORMATION RESPONSE with the given `pti`
          (TS 24.301 §8.3.14). Send-only.
        - `modify_eps_bearer_context_accept` — MODIFY EPS BEARER CONTEXT ACCEPT.
        - `deactivate_eps_bearer_context_accept` — DEACTIVATE EPS BEARER CONTEXT
          ACCEPT.
        - `status_esm` — ESM STATUS with the given `esm_cause` (TS 24.301 §6.6.3).

        ## UE-associated S1AP (TS 36.413)

        - `ue_capability_info` — UE CAPABILITY INFO INDICATION (§8.8). Send-only;
          the MME stores the radio capability.
        - `initial_context_setup_failure` — INITIAL CONTEXT SETUP FAILURE (§8.3.1.4),
          making the MME release the UE context. Send-only.
        - `modify_response` — E-RAB MODIFY RESPONSE confirming a network-initiated
          E-RAB modification (§8.2.2). Send-only.
        - `error_indication` — ERROR INDICATION for the UE's connection (§8.7.2).
        - `release_request` — UE CONTEXT RELEASE REQUEST; the MME's Release Command
          is acknowledged with Release Complete.

        ## Source-eNB side of S1 handover (TS 36.413 §8.4)

        - `handover_required` — HANDOVER REQUIRED toward the target eNB. Send-only;
          the Handover Command arrives asynchronously (await it on the eNB).
        - `handover_cancel` — HANDOVER CANCEL, expecting HANDOVER CANCEL ACKNOWLEDGE.
        - `enb_status_transfer` — ENB STATUS TRANSFER carrying the PDCP counts.
          Send-only.

        ## Raw escape hatch

        - `inject_nas` — Sends an Uplink NAS Transport carrying an
          attacker-controlled NAS PDU: `raw_nas_pdu` (hex, sent verbatim with no
          building or security encoding) or `replay_last` (this UE's last uplink
          NAS PDU, to test replay protection). No reply — the MME discarding it —
          is a valid outcome.

        `mme_ue_s1ap_id_override` / `enb_ue_s1ap_id_override` override the S1AP ID
        pair on any of the uplink messages above, to probe the MME's UE-association validation
        (TS 36.413 §10.6).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendENBUES1APRequest"
      responses:
        "200":
          description: MME reply (S1AP and/or decoded NAS).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendENBUES1APResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}/ue/{ue_id}:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    get:
      operationId: getENBUE
      summary: Get an eNB UE's state
      description: |
        Returns the UE's EPS state — its identities, S1AP ID pair, whether the NAS
        security context is active, the default bearer, and the established PDN
        connections.
      responses:
        "200":
          description: UE state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ENBUEStateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchENBUE
      summary: Update an eNB UE's stored context
      description: |
        Overrides stored UE state before a send, so a step can be driven with
        altered credentials or identifiers. Only the fields present are changed.
        There is no slice (sst/sd) counterpart: slicing is 5GS-only (TS 23.501 §5.15).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                imeisv: { type: string }
                k: { type: string }
                opc: { type: string }
                amf: { type: string }
                sqn: { type: string }
                mme_ue_s1ap_id: { type: integer, description: "Force the stored MME UE S1AP ID." }
      responses:
        "204": { description: "UE updated." }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteENBUE
      summary: Delete an eNB UE
      description: Removes the UE context from the eNB without signalling the MME.
      responses:
        "204": { description: "UE deleted." }
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/ue/{ue_id}/tunnel:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    get:
      operationId: getENBTunnel
      summary: Get the S1-U GTP-U tunnel state for a UE's EPS bearer
      description: |
        Returns the captured tunnel for the selected bearer (the default bearer
        when `ebi` is absent): the S-GW uplink endpoint (sgw_ip, ul_teid), the
        eNB downlink TEID (dl_teid), and the UE IP (ue_ip). Populated when the
        bearer was established on a GTP-U-enabled eNB.
      parameters:
        - name: ebi
          in: query
          schema: { type: integer }
          description: "EPS bearer identity. Defaults to the UE's default bearer."
      responses:
        "200": { description: "Tunnel state." }
        "400": { description: "No user-plane tunnel for the bearer." }
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/ue/{ue_id}/migrate:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: migrateENBUE
      summary: Relocate a UE context to a target eNB after S1 handover
      description: |
        Moves the UE context to the target eNB's association, modelling the UE
        arriving at the target after an S1 handover (TS 23.401 §5.5.1.2). The UE
        keeps its security context; its S1AP ID pair becomes the target's values.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_enb_id]
              properties:
                target_enb_id:
                  type: string
                  description: "Store ID of the eNB to move the UE to."
                mme_ue_s1ap_id:
                  type: integer
                  description: "MME UE S1AP ID at the target (from the Handover Request)."
                enb_ue_s1ap_id:
                  type: integer
                  description: "eNB UE S1AP ID the target assigned to the UE."
      responses:
        "200":
          description: UE relocated.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/s1ap:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    post:
      operationId: sendENBS1AP
      summary: Send a non-UE-associated S1AP message (target-eNB side of S1 handover)
      description: |
        Sends a non-UE-associated S1AP message on the eNB's S1-MME association —
        the target-eNB side of S1 handover, where the eNB acts on a UE it does not
        yet own and addresses it by the S1AP ID pair the MME assigned.

        ## Supported message types

        - `handover_request_acknowledge` — Target-eNB HANDOVER REQUEST ACKNOWLEDGE
          (TS 36.413 §8.4.2), admitting the E-RABs in `admitted_erabs` with their
          downlink S1-U tunnels and rejecting those in `failed_erabs`. Send-only.
        - `handover_notify` — Target-eNB HANDOVER NOTIFY once the UE has arrived
          (TS 36.413 §8.4.3). Send-only.
        - `handover_failure` — Target-eNB HANDOVER FAILURE (TS 36.413 §8.4.2),
          making the MME abort the handover. Send-only.
        - `path_switch_request` — PATH SWITCH REQUEST (TS 36.413 §8.6.1) claiming a
          UE by its `mme_ue_s1ap_id` with a fresh `enb_ue_s1ap_id` and the `erabs`
          to switch. With `wait_for` the call blocks for the acknowledge, failure or
          Error Indication.

        ## Raw escape hatch

        `raw_s1ap_pdu` (hex) is the universal primitive: when set, `message_type`
        is ignored and the bytes are written verbatim onto the S1-MME association
        with no encoding or validation. With `wait_for` the call blocks for one of
        those downlink message types and returns it; otherwise it is
        fire-and-forget.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendENBS1APRequest"
      responses:
        "200":
          description: Sent (S1AP reply when the message expects one).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendENBUES1APResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          $ref: "#/components/responses/BadGateway"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}/await:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    post:
      operationId: awaitENBMessage
      summary: Await an unsolicited non-UE-associated S1AP message
      description: |
        Blocks for an unsolicited non-UE-associated S1AP message on the eNB's
        S1-MME association — e.g. a PAGING the MME broadcasts to reach an
        ECM-IDLE UE (TS 36.413 §9.1.6), or an MME-initiated Reset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_types]
              properties:
                message_types:
                  type: array
                  items:
                    type: string
                  description: "S1AP message types to wait for (first match wins)."
                timeout_ms:
                  type: integer
                  description: "How long to wait. Default 5000."
      responses:
        "200":
          description: Decoded S1AP message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendENBUES1APResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}/ue/{ue_id}/await:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: awaitENBUEMessage
      summary: Await an unsolicited UE-associated downlink S1AP message
      description: |
        Blocks for an unsolicited UE-associated downlink S1AP message addressed to
        this UE — e.g. a network-initiated DETACH REQUEST or a Modify EPS Bearer
        Context Request — matched by the UE's S1AP ID pair so concurrent waiters on
        one eNB association do not consume each other's downlink.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_types]
              properties:
                message_types:
                  type: array
                  items:
                    type: string
                  description: "S1AP message types to wait for (first match wins)."
                timeout_ms:
                  type: integer
                  description: "How long to wait. Default 5000."
      responses:
        "200":
          description: Decoded S1AP message.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendENBUES1APResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}/ue/{ue_id}/uplink:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: sendENBUplink
      summary: Send S1-U uplink user data
      description: |
        Encapsulates a crafted inner IP packet (sourced from the selected bearer's
        UE IP) in a plain S1-U G-PDU and sends it to the S-GW/UPF on that bearer's
        uplink TEID. Exactly one of icmp_echo or udp is used. Requires the eNB
        created with enable_gtpu.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ebi: { type: integer, description: "Bearer to send on; 0 or the default EBI uses the default bearer, else an additional PDN's bearer." }
                src: { type: string, description: "Override the inner source IP (source-spoofing tests); defaults to the bearer's UE IP." }
                teid: { type: integer, description: "Override the uplink TEID (invalid-tunnel tests)." }
                icmp_echo:
                  type: object
                  properties:
                    dst: { type: string }
                    id: { type: integer }
                    seq: { type: integer }
                udp:
                  type: object
                  properties:
                    dst: { type: string }
                    dst_port: { type: integer }
                    src_port: { type: integer }
                    payload_hex: { type: string }
      responses:
        "200":
          description: Sent.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /enb/{enb_id}/ue/{ue_id}/downlink/await:
    parameters:
      - $ref: "#/components/parameters/enb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: awaitENBDownlink
      summary: Await S1-U downlink user data
      description: Blocks for a downlink T-PDU on the selected bearer's eNB TEID and returns the decoded inner packet.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                ebi: { type: integer, description: "Bearer to await on; defaults to the default bearer." }
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200":
          description: Decoded downlink packet.
        "404":
          $ref: "#/components/responses/NotFound"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

  /enb/{enb_id}/gtpu/echo:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    post:
      operationId: sendENBGTPUEcho
      summary: Send a GTP-U Echo Request to the S-GW (S1-U path management)
      description: |
        Sends a GTP-U Echo Request (TS 29.281 §7.2.1) from the eNB's S1-U endpoint
        to sgw_ip and returns the Echo Response. Requires the eNB to have been
        created with enable_gtpu.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sgw_ip]
              properties:
                sgw_ip: { type: string, description: "S-GW S1-U IP to echo." }
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200": { description: "Echo Response received." }
        "504": { description: "No Echo Response before the timeout." }

  /enb/{enb_id}/gtpu/error-indication/await:
    parameters:
      - $ref: "#/components/parameters/enb_id"
    post:
      operationId: awaitENBErrorIndication
      summary: Wait for a GTP-U Error Indication from the S-GW/UPF
      description: |
        Blocks for a GTP-U Error Indication, which the S-GW/UPF must send when it
        receives a G-PDU on S1-U for a TEID with no context (TS 29.281 §7.3.1).
        Requires the eNB to have been created with enable_gtpu.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200": { description: "Error Indication received." }
        "504": { description: "No Error Indication before the timeout." }

  /gnb/{gnb_id}/ue:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    post:
      operationId: createUE
      summary: Create UE
      description: |
        Creates a UE context with subscriber credentials, computes the SUCI,
        and allocates a RAN UE NGAP ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGNBUERequest"
      responses:
        "201":
          description: UE created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateGNBUEResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /gnb/{gnb_id}/ue/{ue_id}:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    get:
      operationId: getUE
      summary: Get UE state
      description: Returns the full UE context including credentials, NGAP IDs, and session config.
      responses:
        "200":
          description: UE state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GNBUEStateResponse"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchUE
      summary: Patch UE state
      description: |
        Overrides any UE state field permanently. Useful for fuzzing — mutate
        credentials, NGAP IDs, or session config before sending the next message.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchGNBUERequest"
      responses:
        "204":
          description: UE patched.
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteUE
      summary: Delete UE
      responses:
        "204":
          description: UE deleted.
        "404":
          $ref: "#/components/responses/NotFound"

  /gnb/{gnb_id}/ngap:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    post:
      operationId: sendGNBNGAP
      summary: Send a gNB-level (non-UE-associated) NGAP message
      description: |
        Sends a non-UE-associated NGAP message on the gNB's existing N2
        association and returns the decoded AMF response.

        ## Supported message types

        - `ng_reset` — Sends an NG RESET (TS 38.413 §8.7.4). With no
          `reset_ue_ids` it resets the whole NG interface; with `reset_ue_ids`
          it resets only those UEs' associations (partOfNG-Interface). The AMF
          answers with NG RESET ACKNOWLEDGE.
        - `handover_request_acknowledge` — Target-gNB HANDOVER REQUEST
          ACKNOWLEDGE (TS 38.413 §8.4.2), admitting the listed `pdu_sessions`
          with their downlink GTP tunnels. Send-only.
        - `handover_notify` — Target-gNB HANDOVER NOTIFY once the UE has
          arrived (TS 38.413 §8.4.3). Send-only.
        - `path_switch_request` — NG-RAN-node PATH SWITCH REQUEST (TS 38.413
          §8.4.4), switching the downlink path of the existing UE context
          identified by `amf_ue_ngap_id` (its Source AMF UE NGAP ID) toward the
          GTP tunnels in `pdu_sessions`. `ran_ue_ngap_id` is the new RAN UE NGAP
          ID. With `wait_for` the call blocks for the AMF's PATH SWITCH REQUEST
          ACKNOWLEDGE or PATH SWITCH REQUEST FAILURE.

        ## Raw escape hatch

        `raw_ngap_pdu` (hex) is the universal primitive: when set,
        `message_type` is ignored and the bytes are written verbatim onto the
        N2 association with no encoding or validation — letting a test craft any
        NGAP PDU at all (well-formed, malformed, out-of-sequence, or garbage) to
        probe how the core reacts. With `wait_for` the call blocks for one of
        those downlink message types and returns it; otherwise it is
        fire-and-forget.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message_type:
                  type: string
                  enum: [ng_reset, handover_request_acknowledge, handover_failure, handover_notify, path_switch_request]
                raw_ngap_pdu:
                  type: string
                  description: "Hex NGAP PDU sent verbatim (overrides message_type). Craft any message, valid or not."
                wait_for:
                  type: array
                  items:
                    type: string
                  description: "Downlink NGAP message types to block for (raw_ngap_pdu, path_switch_request). Empty = fire-and-forget."
                timeout_ms:
                  type: integer
                  description: "With wait_for: how long to wait. Default 5000."
                reset_ue_ids:
                  type: array
                  items:
                    type: string
                  description: "UE IDs whose NG associations to reset (NG Reset). Empty = reset all."
                amf_ue_ngap_id:
                  type: integer
                  description: "AMF UE NGAP ID identifying the UE association (Handover; Path Switch Request Source AMF UE NGAP ID)."
                cause:
                  type: integer
                  description: "Radio-network Cause for handover_failure (TS 38.413 §9.3.1.2). Defaults to ho-failure-in-target-5GC."
                ran_ue_ngap_id:
                  type: integer
                  description: "RAN UE NGAP ID (Handover target-assigned; Path Switch Request new NG-RAN-node ID)."
                pdu_sessions:
                  type: array
                  description: "PDU sessions with their downlink GTP tunnels (Handover Request Acknowledge admitted list; Path Switch Request to-be-switched list)."
                  items:
                    type: object
                    properties:
                      id: { type: integer }
                      dl_teid: { type: integer }
                      dl_ip: { type: string }
                      raw_transfer:
                        type: string
                        description: "Hex transfer that replaces the built one verbatim, for crafting malformed transfers."
                ue_security_capabilities:
                  type: object
                  description: "Path Switch Request: UE security capability bitmaps (TS 38.413 §9.3.1.86). Each is 4 hex digits (16 bits). Defaults: NR NEA1-3/NIA1-3, E-UTRA none."
                  properties:
                    nr_encryption: { type: string }
                    nr_integrity: { type: string }
                    eutra_encryption: { type: string }
                    eutra_integrity: { type: string }
                omit_ies:
                  type: array
                  items:
                    type: integer
                  description: "Path Switch Request: protocol IE ids to drop from the built message, for sending a structurally-incomplete message (e.g. missing a mandatory IE). For fully arbitrary bytes use raw_ngap_pdu."
                failed_pdu_sessions:
                  type: array
                  items:
                    type: integer
                  description: "PDU sessions reported as failed-to-setup (Handover Request Acknowledge; Path Switch Request)."
      responses:
        "200":
          description: Decoded AMF response.
        "404":
          description: gNB not found.
        "504":
          description: No response from the AMF.

  /gnb/{gnb_id}/await:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    post:
      operationId: awaitGNBMessage
      summary: Await an unsolicited downlink NGAP message
      description: |
        Blocks until one of the given NGAP message types arrives on the gNB's
        N2 association, then returns the decoded message. Used for messages the
        core sends without a directly-triggering uplink — e.g. HANDOVER REQUEST
        on a target gNB, or HANDOVER COMMAND / UE CONTEXT RELEASE COMMAND on a
        source gNB during N2 handover.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_types]
              properties:
                message_types:
                  type: array
                  items:
                    type: string
                  description: "NGAP message types to wait for (first match wins)."
                timeout_ms:
                  type: integer
                  description: "How long to wait. Default 5000."
      responses:
        "200":
          description: Decoded NGAP message.
        "404":
          description: gNB not found.
        "504":
          description: No matching message arrived before the timeout.

  /gnb/{gnb_id}/ue/{ue_id}/migrate:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: migrateUE
      summary: Move a UE's context to another gNB
      description: |
        Moves a UE's context (including its security context) from this gNB's
        association to another gNB's, modelling the UE arriving at the target
        after an N2 handover. The RAN/AMF UE NGAP IDs become the ones in use on
        the target, so subsequent UE-associated messages can be sent there.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_gnb_id]
              properties:
                target_gnb_id:
                  type: string
                ran_ue_ngap_id:
                  type: integer
                  description: "RAN UE NGAP ID the UE uses on the target."
                amf_ue_ngap_id:
                  type: integer
                  description: "AMF UE NGAP ID in use on the target connection."
      responses:
        "200":
          description: UE moved.
        "404":
          description: gNB, UE, or target gNB not found.

  /gnb/{gnb_id}/ue/{ue_id}/await:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: awaitUEMessage
      summary: Await an unsolicited downlink NGAP message for a specific UE
      description: |
        Like the gNB-level await, but only returns a downlink PDU addressed to
        this UE (matched by its RAN/AMF UE NGAP ID). This lets many UEs share one
        gNB association without consuming each other's downlink — needed for
        concurrency and fast-sequence scenarios. A PDU that carries no UE NGAP ID
        (e.g. an association-level Error Indication) matches any waiter.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_types]
              properties:
                message_types:
                  type: array
                  items:
                    type: string
                  description: "NGAP message types to wait for (first match wins)."
                timeout_ms:
                  type: integer
                  description: "How long to wait. Default 5000."
      responses:
        "200":
          description: Decoded NGAP message addressed to the UE.
        "404":
          description: gNB or UE not found.
        "504":
          description: No matching message arrived before the timeout.

  /gnb/{gnb_id}/gtpu/echo:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    post:
      operationId: sendGTPUEcho
      summary: Send a GTP-U Echo Request to the UPF (N3 path management)
      description: |
        Sends a GTP-U Echo Request (TS 29.281 §7.2.1) from the gNB's N3 endpoint
        to upf_ip and returns the Echo Response. Requires the gNB to have been
        created with enable_gtpu.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upf_ip]
              properties:
                upf_ip: { type: string, description: "UPF N3 IP to echo." }
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200": { description: "Echo Response received." }
        "504": { description: "No Echo Response before the timeout." }

  /gnb/{gnb_id}/gtpu/error-indication/await:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
    post:
      operationId: awaitErrorIndication
      summary: Wait for a GTP-U Error Indication from the UPF
      description: |
        Blocks for a GTP-U Error Indication, which the UPF must send when it
        receives a G-PDU for a TEID with no context (TS 29.281 §7.3.1). Requires
        the gNB to have been created with enable_gtpu.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200": { description: "Error Indication received." }
        "504": { description: "No Error Indication before the timeout." }

  /gnb/{gnb_id}/ue/{ue_id}/tunnel:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    get:
      operationId: getTunnel
      summary: Get the N3 GTP-U tunnel state for a UE's PDU session
      description: |
        Returns the captured tunnel: the gNB downlink endpoint (n3_gnb_ip,
        dl_teid), the UPF uplink tunnel (upf_ip, ul_teid), the UE IP (ue_ip), and
        the QFI. Populated when the PDU session was established on a GTP-U gNB.
      responses:
        "200": { description: "Tunnel state." }
        "400": { description: "No established N3 tunnel / gNB has no GTP-U endpoint." }

  /gnb/{gnb_id}/ue/{ue_id}/uplink:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: sendUplink
      summary: Send a user-plane uplink packet through the N3 tunnel
      description: |
        Builds an inner IP packet sourced from the UE IP and sends it to the UPF
        as a GTP-U G-PDU (with the uplink PDU Session Container / QFI, TS 38.415).
        Exactly one of icmp_echo or udp is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pdu_session_id: { type: integer, description: "Defaults to the UE's session." }
                teid: { type: integer, description: "Override the uplink TEID, e.g. to send to a TEID with no PDR (TS 29.281 §7.3.1)." }
                src: { type: string, description: "Override the inner source IP (source-spoofing tests); defaults to the session's UE IP." }
                icmp_echo:
                  type: object
                  properties:
                    dst: { type: string }
                    id: { type: integer }
                    seq: { type: integer }
                udp:
                  type: object
                  properties:
                    dst: { type: string }
                    dst_port: { type: integer }
                    src_port: { type: integer }
                    payload_hex: { type: string }
      responses:
        "200": { description: "Packet encapsulated and sent." }
        "400": { description: "No established N3 tunnel, or invalid request." }

  /gnb/{gnb_id}/ue/{ue_id}/downlink/await:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: awaitDownlink
      summary: Await a downlink user-plane packet on the N3 tunnel
      description: |
        Blocks for a downlink G-PDU on the session's DL TEID and returns the
        decapsulated inner IP packet (parsed fields under `inner`, plus raw_hex).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pdu_session_id: { type: integer }
                timeout_ms: { type: integer, description: "How long to wait. Default 5000." }
      responses:
        "200": { description: "Decapsulated downlink packet." }
        "504": { description: "No downlink before the timeout." }

  /gnb/{gnb_id}/ue/{ue_id}/ngap:
    parameters:
      - $ref: "#/components/parameters/gnb_id"
      - $ref: "#/components/parameters/ue_id"
    post:
      operationId: sendNGAP
      summary: Send NGAP message
      description: |
        Builds an NGAP message using stored gNB/UE state, sends it over SCTP,
        waits for the AMF response, and returns the decoded NGAP + NAS.

        The request body controls which NAS message to send and which optional
        IEs to include. Any field present overrides the stored default.
        Omitted fields use sensible defaults from the UE context.

        **Does NOT auto-respond** — the caller controls the entire flow.

        ## Supported message types

        - `registration_request` — Sends RegistrationRequest inside InitialUEMessage.
        - `authentication_response` — Computes 5G-AKA RES* from stored RAND/AUTN, sends AuthenticationResponse in UplinkNASTransport.
        - `security_mode_complete` — Derives NAS keys, sends SecurityModeComplete (with integrity+ciphering) in UplinkNASTransport.
        - `registration_complete` — Sends InitialContextSetupResponse + RegistrationComplete (with integrity+ciphering) in UplinkNASTransport.

        ## NAS IE overrides (TS 24.501 §8.2.6)

        For `registration_request`, every optional IE in the RegistrationRequest
        can be individually set via the corresponding JSON field. Hex-encoded
        strings are used for binary IEs. This enables both valid and deliberately
        malformed messages for fuzz testing.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendGNBUENGAPRequest"
      responses:
        "200":
          description: NGAP message sent and response received.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendGNBUENGAPResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          $ref: "#/components/responses/BadGateway"
        "504":
          $ref: "#/components/responses/GatewayTimeout"

components:
  parameters:
    gnb_id:
      name: gnb_id
      in: path
      required: true
      schema:
        type: string
    ue_id:
      name: ue_id
      in: path
      required: true
      schema:
        type: string
    enb_id:
      name: enb_id
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadGateway:
      description: SCTP or NGAP error communicating with the AMF.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Failed to build or encode the message.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    GatewayTimeout:
      description: Timed out waiting for AMF response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    CreateGNBRequest:
      type: object
      required: [amf_address]
      properties:
        amf_address:
          type: string
          description: "AMF SCTP address (host:port)."
          example: "10.3.0.2:38412"
        gnb_n2_address:
          type: string
          description: Local bind address for SCTP. Defaults to 0.0.0.0.
        mcc:
          type: string
          pattern: "^\\d{3}$"
          example: "001"
        mnc:
          type: string
          pattern: "^\\d{2,3}$"
          example: "01"
        tac:
          type: string
          description: Tracking Area Code (hex).
          example: "000001"
        gnb_id:
          type: string
          description: gNB ID (hex).
          example: "000001"
        gnb_id_bit_length:
          type: integer
          description: gNB-ID bit length, 22–32 (TS 38.413 §9.3.1.6). Defaults to 24.
        name:
          type: string
        sst:
          type: integer
          description: Slice/Service Type.
        sd:
          type: string
          description: Slice Differentiator (hex, optional).
        slices:
          type: array
          items:
            $ref: "#/components/schemas/SliceInput"
        ng_setup_ies:
          type: array
          description: Override — send these raw IEs instead of auto-building.
          items:
            type: object
        skip_ng_setup:
          type: boolean
          description: >
            Open the SCTP association without sending an NG Setup Request,
            modelling an NG-RAN node that has not completed NG Setup (TS 38.413
            §8.7.1.1). The response carries no ng_setup_response.
        raw_ngap_pdu:
          type: string
          description: Hex NGAP PDU sent verbatim instead of an NG Setup Request.
        wait_for:
          type: array
          description: NGAP message types to wait for. Default NGSetupResponse/NGSetupFailure/ErrorIndication.
          items: { type: string }
        timeout_ms:
          type: integer
          description: How long to wait for the response. Default 5000.
        enable_gtpu:
          type: boolean
          description: >
            Bind an N3 GTP-U endpoint so the gNB terminates the user-plane data
            path (send uplink, receive downlink). Only one GTP-U-enabled gNB can
            exist per N3 IP (it binds the GTP-U port).
        gnb_n3_address:
          type: string
          description: >
            N3 IP the GTP-U endpoint binds and advertises as its downlink
            endpoint. Defaults to gnb_n2_address.

    SliceInput:
      type: object
      properties:
        sst:
          type: integer
        sd:
          type: string

    CreateGNBResponse:
      type: object
      properties:
        gnb_id:
          type: string
        ng_setup_response:
          $ref: "#/components/schemas/NGAPResponse"

    GNBStateResponse:
      type: object
      properties:
        id:
          type: string
        mcc:
          type: string
        mnc:
          type: string
        tac:
          type: string
        gnb_id:
          type: string
        gnb_id_bit_length:
          type: integer
        name:
          type: string
        sst:
          type: integer
        sd:
          type: string

    CreateENBRequest:
      type: object
      required: [mme_address]
      properties:
        mme_address:
          type: string
          description: "MME S1-MME SCTP address (host:port)."
          example: "10.3.0.2:36412"
        enb_s1_address:
          type: string
          description: Local bind address for SCTP. Defaults to 0.0.0.0.
        mcc:
          type: string
          pattern: "^\\d{3}$"
          example: "001"
        mnc:
          type: string
          pattern: "^\\d{2,3}$"
          example: "01"
        tac:
          type: string
          description: Tracking Area Code (2-octet hex).
          example: "0001"
        enb_id:
          type: string
          description: eNB ID (hex).
          example: "00001"
        enb_id_bit_length:
          type: integer
          description: >
            eNB-ID CHOICE variant by bit length (TS 36.413 §9.2.1.37):
            20 macro (default), 28 home, 18 short-macro, 21 long-macro.
          example: 20
        name:
          type: string
        enable_gtpu:
          type: boolean
          description: Bind an S1-U GTP-U endpoint so the eNB terminates the user-plane data path.
        enb_n3_address:
          type: string
          description: IP the S1-U GTP-U endpoint binds (defaults to enb_s1_address).
        raw_s1ap_pdu:
          type: string
          description: >
            Hex S1AP PDU written verbatim in place of a built S1 Setup Request,
            with no encoding or validation — send any PDU, well-formed or not. A
            raw send whose reply times out returns a null response (HTTP 201)
            rather than an error, modelling an MME that drops a malformed PDU.
        wait_for:
          type: array
          items:
            type: string
          description: >
            Downlink message types to block for. Defaults to S1SetupResponse,
            S1SetupFailure, and ErrorIndication.
        timeout_ms:
          type: integer
          description: Wait bound in milliseconds (default 5000, or 2000 for a raw send).
        skip_s1_setup:
          type: boolean
          description: Open the SCTP association without sending an S1 Setup Request.

    CreateENBResponse:
      type: object
      properties:
        enb_id:
          type: string
          description: Store handle used in subsequent /enb/{enb_id} requests.
        s1_setup_response:
          $ref: "#/components/schemas/S1APResponse"
          description: First matching downlink, or null if none arrived in time.

    ENBStateResponse:
      type: object
      properties:
        id:
          type: string
        mcc:
          type: string
        mnc:
          type: string
        tac:
          type: string
        enb_id:
          type: string
          description: eNB ID (hex).
        enb_id_bit_length:
          type: integer
          description: eNB-ID CHOICE variant by bit length (TS 36.413 §9.2.1.37).
        name:
          type: string

    S1APResponse:
      type: object
      properties:
        pdu_type:
          type: string
          enum: [initiating_message, successful_outcome, unsuccessful_outcome]
        message_type:
          type: string
          description: "Decoded message name (e.g. S1SetupResponse, S1SetupFailure)."
        raw_hex:
          type: string
          description: Full S1AP PDU as hex.
        mme_name:
          type: string
          description: Present on an S1SetupResponse.
        served_gummeis:
          type: array
          description: Present on an S1SetupResponse.
          items:
            type: object
        relative_mme_capacity:
          type: integer
          description: Present on an S1SetupResponse.
        time_to_wait:
          type: string
          description: Present on an S1SetupFailure when the MME signals a back-off.
        unknown_ies:
          type: array
          description: ProtocolIEs the received message carries that its message type does not model, in wire order.
          items:
            type: object
            properties:
              id:
                type: integer
              criticality:
                type: string
                description: >-
                  reject, ignore, or notify: how a receiver must act on an IE it does not
                  comprehend (TS 36.413 §10.3.2). A value outside the ENUMERATED range is
                  rendered Criticality(n).
              value_hex:
                type: string
                description: Raw open-type value bytes as hex.

    CreateENBUERequest:
      type: object
      required: [imsi, k, opc]
      properties:
        imsi:
          type: string
          description: "15-digit IMSI (an 'imsi-' prefix is accepted)."
          example: "001010000000001"
        imeisv:
          type: string
          description: "16-digit IMEISV, returned in Security Mode Complete when set (TS 24.301 §5.4.3)."
        k:
          type: string
          description: Subscriber key K (hex).
        opc:
          type: string
          description: Operator variant key OPc (hex).
        amf:
          type: string
          description: Authentication Management Field (hex).
        sqn:
          type: string
          description: Sequence number (hex).
        ue_network_capability:
          type: string
          description: >
            Advertised EEA/EIA support bitmap (hex), e.g. "2020" for EEA2/EIA2
            only. Defaults to EEA0/1/2 + EIA0/1/2.

    CreateENBUEResponse:
      type: object
      properties:
        ue_id:
          type: string
        enb_ue_s1ap_id:
          type: integer

    ENBUEStateResponse:
      type: object
      properties:
        ue_id:
          type: string
        imsi:
          type: string
        imeisv:
          type: string
        ue_ip:
          type: string
          description: Assigned in the Attach Accept; empty before the attach completes.
        security_active:
          type: boolean
        mme_ue_s1ap_id:
          type: integer
          description: Set by the MME after the first S1AP exchange.
        enb_ue_s1ap_id:
          type: integer
        default_ebi:
          type: integer
          description: EPS bearer identity of the default bearer.
        bearers:
          type: array
          description: PDN connections beyond the default bearer (TS 24.301 §6.5.1).
          items:
            type: object
            properties:
              ebi:
                type: integer
              apn:
                type: string
              ue_ip:
                type: string

    SendENBUES1APRequest:
      type: object
      required: [message_type]
      properties:
        message_type:
          type: string
          enum: [attach_request, authentication_response, authentication_failure, identity_response, security_mode_complete, security_mode_reject, attach_complete, detach_request, release_request, service_request, ue_capability_info, tracking_area_update, pdn_connectivity, pdn_disconnect, bearer_resource_allocation_request, bearer_resource_modification_request, esm_information_response, modify_response, modify_eps_bearer_context_accept, deactivate_eps_bearer_context_accept, status_esm, reset, inject_nas, handover_required, handover_cancel, enb_status_transfer, initial_context_setup_failure, error_indication]
        pdn_type:
          type: integer
          description: "Requested PDN type for attach: 1=IPv4, 2=IPv6, 3=IPv4v6 (default 1)."
        attach_type:
          type: integer
          description: "EPS attach type: 1=EPS, 2=combined EPS/IMSI, 6=emergency (default 1)."
        ue_network_capability:
          type: string
          description: "attach_request override — UE network capability (hex, TS 24.301 §9.9.3.34); overrides the stored value."
        ms_network_capability:
          type: string
          description: "attach_request override — MS network capability (hex, TS 24.008 §10.5.5.12)."
        drx_parameter:
          type: string
          description: "attach_request override — DRX parameter (hex, 2 octets, TS 24.301 §9.9.3.8)."
        foreign_guti:
          type: boolean
          description: >
            Make attach_request use a GUTI the MME does not know (instead of the
            IMSI) to drive the Identity procedure.
        raw_nas_pdu:
          type: string
          description: >
            On attach_request, hex NAS bytes sent verbatim in the Initial UE
            Message (malformed-NAS robustness tests).
        corrupt_mac:
          type: boolean
          description: >
            On security_mode_complete, flip a NAS-MAC byte so the MME's integrity
            check fails; the MME must discard the message.
        mme_ue_s1ap_id_override:
          type: integer
          description: >
            Override the MME-UE-S1AP-ID in the S1AP wrapper of every uplink message
            this UE sends (Uplink NAS Transport, UE Capability Info Indication, UE
            Context Release Request). Use a stale, unknown or another UE's value to
            exercise TS 36.413 §10.6.
        enb_ue_s1ap_id_override:
          type: integer
          description: >
            Override the eNB-UE-S1AP-ID in the S1AP wrapper of every uplink message
            this UE sends — on its own it pairs a valid MME-UE-S1AP-ID with an
            inconsistent eNB-UE-S1AP-ID (TS 36.413 §10.6).
        rrc_establishment_cause:
          type: integer
          description: Override RRC establishment cause in InitialUEMessage (attach_request only).
        replay_last:
          type: boolean
          description: On inject_nas, resend this UE's last uplink NAS PDU (replay test).
        switch_off:
          type: boolean
          description: On detach_request, mark the UE as powering off (no Detach Accept expected).
        release_cause:
          type: integer
          description: On release_request, the radio-network Cause value the eNB reports (TS 36.413 §9.2.1.3); default user-inactivity (20).
        mtmsi:
          type: integer
          description: On service_request, override the S-TMSI M-TMSI (unknown-UE tests).
        nas_count:
          type: integer
          description: On service_request, force the uplink NAS COUNT in the short-MAC (replay tests).
        eps_update_type:
          type: integer
          description: On tracking_area_update, the EPS update type (0=TA, 1/2=combined, 3=periodic).
        apn:
          type: string
          description: On pdn_connectivity, the access point name of the additional PDN connection (TS 24.301 §6.5.1).
        pti:
          type: integer
          description: On pdn_connectivity/pdn_disconnect/bearer_resource_allocation_request/bearer_resource_modification_request/esm_information_response, override the procedure transaction identity (0=unassigned, 255=reserved, for §7.3.1 invalid-PTI tests).
        withhold_accept:
          type: boolean
          description: On pdn_connectivity/pdn_disconnect, suppress the automatic ESM accept so the MME's T3485/T3495 retransmission is observable (TS 24.301 §6.4.1.6, §6.4.4.5).
        request_ebi:
          type: integer
          description: On pdn_connectivity, override the ESM-header EPS bearer identity (normally 0; non-zero for §7.3.2 invalid-EBI tests).
        linked_ebi:
          type: integer
          description: On pdn_disconnect, the linked default-bearer identity of the PDN connection to release (TS 24.301 §6.5.2).
        eps_bearer_identity:
          type: integer
          description: On esm_status / modify_eps_bearer_context_accept / deactivate_eps_bearer_context_accept, the bearer the message targets. Defaults to the default bearer.
        esm_cause:
          type: integer
          description: On esm_status (or a modify reject), the ESM cause (TS 24.301 §9.9.4.4); #43 makes the MME deactivate the bearer. Defaults to #111.
        res_override:
          type: string
          description: Override the computed RES with these hex bytes (wrong-RES tests).
        cause:
          type: integer
          description: >
            EMM cause for an authentication_failure step: 20=MAC failure,
            21=synch failure (AUTS auto-included), 26=non-EPS unacceptable.
        target_enb_id:
          type: string
          description: On handover_required, the store ID of the target eNB (its PLMN and eNB-ID form the Target eNB-ID the MME resolves).
        handover_required_cause:
          type: integer
          description: On handover_required, the radio-network Cause the source eNB reports (TS 36.413 §9.2.1.3). Defaults to handover-desirable-for-radio-reasons.
        handover_cancel_cause:
          type: integer
          description: On handover_cancel, override the radio-network Cause (TS 36.413 §9.2.1.3).
        status_transfer_container:
          type: string
          description: On enb_status_transfer, the opaque PDCP status container (hex) relayed to the target eNB.
        timeout_ms:
          type: integer

    SendENBS1APRequest:
      type: object
      properties:
        message_type:
          type: string
          enum: [reset, handover_request_acknowledge, handover_notify, handover_failure, path_switch_request]
        raw_s1ap_pdu:
          type: string
          description: When set, hex S1AP PDU written verbatim onto the S1-MME association with no encoding or validation; message_type is ignored. Lets a test send any S1AP PDU, well-formed or not.
        wait_for:
          type: array
          items: { type: string }
          description: With raw_s1ap_pdu or path_switch_request, downlink S1AP message types to block for (empty = fire-and-forget).
        timeout_ms:
          type: integer
          description: With raw_s1ap_pdu + wait_for, how long to wait. Default 5000.
        mme_ue_s1ap_id:
          type: integer
          description: MME UE S1AP ID the MME assigned to the incoming UE (from the Handover Request).
        enb_ue_s1ap_id:
          type: integer
          description: eNB UE S1AP ID the target eNB assigns the UE; reused across handover_request_acknowledge and handover_notify. On path_switch_request, a fresh value the relocating eNB claims, staling the source association (TS 36.413 §10.6).
        erabs:
          type: array
          description: On path_switch_request, the E-RABs to switch to this eNB with their downlink S1-U endpoints.
          items:
            type: object
            required: [id]
            properties:
              id: { type: integer, description: "E-RAB ID." }
              dl_teid: { type: integer, description: "Target eNB downlink TEID (default synthesized)." }
              dl_ip: { type: string, description: "Target eNB S1-U address (default the eNB's own)." }
        duplicate_erab:
          type: boolean
          description: On path_switch_request, list the E-RAB ID twice (abnormal; MME rejects with multiple-E-RAB-ID-instances).
        path_switch_eea:
          type: integer
          description: On path_switch_request, override the reported EPS encryption-algorithm bitmap; a mismatch with the stored value makes the MME replay its caps in the Ack.
        path_switch_eia:
          type: integer
          description: On path_switch_request, override the reported EPS integrity-algorithm bitmap (see path_switch_eea).
        admitted_erabs:
          type: array
          description: On handover_request_acknowledge, the E-RABs the target admits with their downlink S1-U endpoints.
          items:
            type: object
            required: [id]
            properties:
              id: { type: integer, description: "E-RAB ID." }
              dl_teid: { type: integer, description: "Target eNB downlink TEID (default synthesized)." }
              dl_ip: { type: string, description: "Target eNB S1-U address (default the eNB's own)." }
        failed_erabs:
          type: array
          items: { type: integer }
          description: On handover_request_acknowledge, E-RAB IDs the target rejects.
        cause:
          type: integer
          description: On handover_failure, override the radio-network Cause (default ho-failure-in-target).
        cell_id:
          type: integer
          description: On handover_notify, override the E-UTRAN cell identity of the UE's new location (default 1).

    SendENBUES1APResponse:
      type: object
      properties:
        s1ap:
          $ref: "#/components/schemas/S1APResponse"
        nas:
          type: object
          description: Decoded downlink EPS NAS message.
        mac_verified:
          type: boolean
          description: >
            Whether a protected downlink's NAS-MAC verified under the
            independently-derived keys (set for the Security Mode Command).

    CreateGNBUERequest:
      type: object
      required: [supi, k, opc]
      properties:
        supi:
          type: string
          description: "Subscription Permanent Identifier (e.g. imsi-001010000000001)."
          example: "imsi-001010000000001"
        k:
          type: string
          pattern: "^[0-9a-fA-F]{32}$"
          description: Permanent key (32 hex chars).
        opc:
          type: string
          pattern: "^[0-9a-fA-F]{32}$"
          description: Operator code (32 hex chars).
        amf:
          type: string
          description: Authentication Management Field (4 hex chars). Default 8000.
          default: "8000"
        sqn:
          type: string
          description: Sequence number (12 hex chars). Default 000000000000.
          default: "000000000000"
        sst:
          type: integer
        sd:
          type: string
        dnn:
          type: string
        routing_indicator:
          type: string
          default: "0"
        protection_scheme:
          type: string
          description: "SUCI protection scheme: 0=null, 1=Profile A (X25519), 2=Profile B (P-256)."
          default: "0"
        public_key_id:
          type: string
          default: "0"
        public_key_hex:
          type: string
          description: Home network public key (hex). Required for protection_scheme 1 or 2.
        pdu_session_id:
          type: integer
        pdu_session_type:
          type: integer
        imeisv:
          type: string
        ue_security_capability:
          type: string
          description: >
            Advertised NEA/NIA support bitmap (hex), e.g. "2020" for NEA2/NIA2
            only. Defaults to NEA0/1/2 + NIA0/1/2. Overridable per message via
            the send-NGAP ue_security_capability field.

    CreateGNBUEResponse:
      type: object
      properties:
        ue_id:
          type: string
        supi:
          type: string
        suci:
          type: string
          description: Computed SUCI string.
        ran_ue_ngap_id:
          type: integer

    GNBUEStateResponse:
      type: object
      properties:
        ue_id:
          type: string
        supi:
          type: string
        suci:
          type: string
        imeisv:
          type: string
        ue_ip:
          type: string
          description: Assigned in the PDU Session Establishment Accept; empty before a session is established.
        security_active:
          type: boolean
        ran_ue_ngap_id:
          type: integer
        amf_ue_ngap_id:
          type: integer
          description: Set by the AMF after the first NGAP exchange.
        default_pdu_session_id:
          type: integer
          description: PDU session identity of the default session.
        sessions:
          type: array
          description: Active PDU sessions (TS 23.501 §5.6).
          items:
            type: object
            properties:
              pdu_session_id:
                type: integer
              ue_ip:
                type: string
        dnn:
          type: string
        sst:
          type: integer
        sd:
          type: string
        protection_scheme:
          type: string
        routing_indicator:
          type: string

    PatchGNBUERequest:
      type: object
      description: Any field present is overwritten in the UE context.
      properties:
        k:
          type: string
        opc:
          type: string
        amf:
          type: string
        sqn:
          type: string
        amf_ue_ngap_id:
          type: integer
        dnn:
          type: string
        sst:
          type: integer
        sd:
          type: string
        imeisv:
          type: string

    SendGNBUENGAPRequest:
      type: object
      required: [message_type]
      properties:
        message_type:
          type: string
          description: NAS message to send.
          enum: [registration_request, authentication_response, security_mode_complete, registration_complete, pdu_session_establishment_request, deregistration_request, ue_context_release_request, service_request, identity_response, pdu_session_release_request, pdu_session_release_complete, pdu_session_modification_request, pdu_session_modification_complete, pdu_session_modification_command_reject, status_5gsm, authentication_failure, security_mode_reject, handover_required, handover_cancel, ran_status_transfer, inject_nas, ue_capability_info, error_indication, initial_context_setup_failure]
        raw_nas_pdu:
          type: string
          description: |
            Raw NAS PDU override (hex). When set, all NAS building and security
            encoding is skipped — these bytes are sent directly in the NGAP wrapper.
            Use for fuzz testing with arbitrary/malformed NAS content.
        rrc_establishment_cause:
          type: integer
          description: Override RRC establishment cause in InitialUEMessage (registration_request only).
        ue_context_request:
          type: integer
          description: Override UE Context Request in InitialUEMessage. Set to -1 to omit entirely.
        amf_ue_ngap_id_override:
          type: integer
          description: Override the AMF UE NGAP ID in UE-associated NGAP messages (e.g. UplinkNASTransport, handover_required). Use a stale/unknown value to exercise TS 38.413 §10.6.
        ran_ue_ngap_id_override:
          type: integer
          description: Override RAN UE NGAP ID in the NGAP wrapper.
        res_star_override:
          type: string
          description: Override RES* in authentication_response (hex, 16 bytes). Skips 5G-AKA computation.
        corrupt_mac:
          type: boolean
          description: On a security-protected message (security_mode_complete/service_request/mobility registration_request), flip a NAS-MAC byte so the AMF's integrity check fails and it discards the message (TS 24.501 §4.4.4.3).
        nas_count:
          type: integer
          description: Force the uplink NAS COUNT written into a built message (e.g. a stale value) for replay/robustness tests; the UE's real counter still advances.
        replay_last:
          type: boolean
          description: On inject_nas, resend this UE's last secured uplink NAS PDU verbatim (NAS replay protection test, TS 24.501 §4.4.3.2).
        status_transfer_drbs:
          type: array
          description: |
            On ran_status_transfer, the DRBs whose PDCP status the source NG-RAN
            node reports (TS 38.413 §8.4.6.2). Defaults to one DRB with zeroed COUNTs.
          items:
            type: object
            properties:
              drb_id: { type: integer }
              ul_pdcp_sn: { type: integer }
              ul_hfn: { type: integer }
              dl_pdcp_sn: { type: integer }
              dl_hfn: { type: integer }
        timeout_ms:
          type: integer
          description: Bounds how long a send waits for a downlink. Default 5000.
        ue_radio_capability:
          type: string
          description: On ue_capability_info, the hex UE radio capability the gNB reports; the AMF replays it in a later Initial Context Setup Request.
        release_cause:
          type: integer
          description: "Radio-network Cause value for ue_context_release_request (TS 38.413 §9.3.1.2). Default 20 (user-inactivity)."
        service_type:
          type: integer
          description: "Service type for service_request (TS 24.501 §9.11.3.50). Default 1 (data). 0=signalling, 2=mobile-terminated."
        target_gnb_id:
          type: string
          description: "Target gNB identity (hex) for handover_required (TS 38.413 §8.4.1). The resulting Handover Command arrives asynchronously — await it on the source gNB."
        pdu_session_ids:
          type: array
          items:
            type: integer
          description: "PDU sessions to hand over in handover_required. Defaults to the UE's session; set to non-existent IDs to exercise abnormal cases."
        pdu_session_id:
          type: integer
          description: "Which PDU session a pdu_session_establishment_request establishes, so a UE can hold more than one."
        request_type:
          type: integer
          description: "Request Type IE of the UL NAS Transport carrying a 5GSM message (TS 24.501 §9.11.3.47): 1=initial request, 2=existing PDU session, 3=initial emergency, 4=existing emergency, 5=modification request, 7=reserved. When unset, no Request Type IE is sent. Applies to the pdu_session_modification_request / pdu_session_release_request endpoints."
        pti:
          type: integer
          description: "Procedure Transaction Identity of a 5GSM message (TS 24.501 §9.6, §7.3.1): 0=unassigned, 1-254=assigned, 255=reserved. When unset, an assigned value (1) is used. Applies to the pdu_session_establishment_request / pdu_session_modification_request / pdu_session_release_request / pdu_session_release_complete / pdu_session_modification_complete / pdu_session_modification_command_reject / status_5gsm endpoints."
        always_on_requested:
          type: boolean
          description: "Add the Always-on PDU session requested IE to a pdu_session_establishment_request (TS 24.501 §8.3.1.7). The network must answer with an Always-on PDU session indication in the Establishment Accept (§6.4.1)."
        5gsm_cause:
          type: integer
          description: "5GSM cause for a UE-originated reject/status message (TS 24.501 §9.11.4.2). Applies to the pdu_session_modification_command_reject / status_5gsm endpoints. Defaults to #111 protocol error, unspecified."
        handover_required_cause:
          type: integer
          description: "Radio-network Cause the source NG-RAN node reports on handover_required (TS 38.413 §9.3.1.2). Defaults to handover-desirable-for-radio-reason."
        handover_cancel_cause:
          type: integer
          description: "Radio-network Cause for handover_cancel (TS 38.413 §9.3.1.2). Defaults to handover-cancelled."
        existing_connection:
          type: boolean
          description: "Send a registration_request over the existing UE-associated connection (Uplink NAS Transport) instead of an Initial UE Message — e.g. a Mobility Registration Update after an N2 handover."
        switch_off:
          type: integer
          description: "Deregistration switch-off flag (TS 24.501 §9.11.3.20). Default 1 (switch off, no accept). 0 = normal de-registration (AMF replies with Deregistration Accept)."
        registration_type:
          type: integer
          description: "5GS registration type: 1=initial, 2=mobility, 3=periodic, 4=emergency."
        ng_ksi:
          type: integer
          description: NAS Key Set Identifier override.
        follow_on_request:
          type: integer
          description: "FOR bit (0 or 1). Default 1."
        mobile_identity_override:
          type: string
          description: Override mobile identity (hex). Replaces SUCI/GUTI.
        ue_security_capability:
          type: string
          description: Override UE security capability (hex, 2-8 bytes).
        requested_nssai:
          type: array
          items:
            type: object
            properties:
              sst:
                type: integer
              sd:
                type: string
        capability_5gmm:
          type: string
          description: 5GMM capability (hex).
        non_current_native_nas_ksi:
          type: integer
        last_visited_registered_tai:
          type: string
          description: Last visited TAI (hex, 6 bytes).
        s1_ue_network_capability:
          type: string
          description: S1 UE network capability (hex).
        uplink_data_status:
          type: string
          description: Uplink data status (hex, 2+ bytes).
        pdu_session_status:
          type: string
          description: PDU session status (hex, 2+ bytes).
        mico_indication:
          type: integer
          description: "MICO indication (RAAI bit)."
        ue_status:
          type: integer
          description: "UE status (bit 0: S1 mode, bit 1: N1 mode)."
        additional_guti:
          type: string
          description: Additional GUTI (hex).
        allowed_pdu_session_status:
          type: string
          description: Allowed PDU session status (hex).
        ues_usage_setting:
          type: integer
        requested_drx_parameters:
          type: integer
        eps_nas_message_container:
          type: string
          description: EPS NAS message container (hex).
        ladn_indication:
          type: string
          description: LADN indication (hex).
        payload_container:
          type: string
          description: Payload container (hex).
        network_slicing_indication:
          type: integer
          description: "Network slicing indication (bit 0: NSSCI, bit 1: DCNI)."
        update_type_5gs:
          type: string
          description: 5GS update type (hex).
        nas_message_container:
          type: string
          description: NAS message container (hex).
        eps_bearer_context_status:
          type: string
          description: EPS bearer context status (hex, 2 bytes).

    SendGNBUENGAPResponse:
      type: object
      properties:
        ngap:
          $ref: "#/components/schemas/NGAPResponse"
        nas:
          $ref: "#/components/schemas/NASResponse"

    NGAPResponse:
      type: object
      description: >-
        Decoded NGAP message. Each ProtocolIE the message type models is surfaced as
        its own typed field; IEs it does not model are collected in unknown_ies.
      properties:
        pdu_type:
          type: string
          enum: [initiating_message, successful_outcome, unsuccessful_outcome]
        message_type:
          type: string
          description: "Decoded message name (e.g. NGSetupResponse, DownlinkNASTransport)."
        raw_hex:
          type: string
          description: Full NGAP PDU as hex.
        amf_ue_ngap_id:
          type: integer
        ran_ue_ngap_id:
          type: integer
        nas_pdu:
          type: string
          description: NAS PDU as hex.
        cause:
          type: object
          description: Cause group and the index of its ASN.1 enumeration (TS 38.413 §9.3.1.2).
        criticality_diagnostics:
          type: object
        time_to_wait:
          type: string
        global_ran_node_id:
          type: object
        ran_node_name:
          type: string
        supported_ta_list:
          type: object
        default_paging_drx:
          type: integer
        user_location_information:
          type: object
        rrc_establishment_cause:
          type: integer
        five_g_s_tmsi:
          type: object
        ue_context_request:
          type: integer
        amf_name:
          type: string
        served_guami_list:
          type: array
          items:
            type: object
        relative_amf_capacity:
          type: integer
        plmn_support_list:
          type: array
          items:
            type: object
        ue_retention_information:
          type: integer
        amf_set_id_ie:
          type: string
        allowed_nssai:
          type: array
          items:
            type: object
        selected_plmn_identity:
          type: string
        old_amf:
          type: string
        ran_paging_priority:
          type: integer
        mobility_restriction_list:
          type: object
        index_to_rfsp:
          type: integer
        ue_aggregate_max_bit_rate:
          type: object
          description: UE-AMBR downlink and uplink bit rates.
        ue_radio_capability:
          type: string
        pdu_session_setup_items:
          type: array
          items:
            type: object
        pdu_session_ids:
          type: array
          items:
            type: integer
        release_pdu_session_ids:
          type: array
          items:
            type: integer
        next_hop_chaining_count:
          type: integer
        next_hop:
          type: string
          description: Next Hop key (NH) as hex (TS 33.501 §6.9.2.3.2).
        ue_security_capabilities:
          type: object
        ran_status_transfer:
          type: object
        source_to_target_transparent_container:
          type: string
        reset_connections:
          type: array
          description: UE-associated logical NG-connections echoed in an NG Reset Acknowledge, in wire order.
          items:
            type: object
            properties:
              amf_ue_ngap_id:
                type: integer
              ran_ue_ngap_id:
                type: integer
        unknown_ies:
          type: array
          description: ProtocolIEs the received message carries that its message type does not model, in wire order.
          items:
            type: object
            properties:
              id:
                type: integer
              criticality:
                type: string
                description: >-
                  reject, ignore, or notify: how a receiver must act on an IE it does not
                  comprehend (TS 38.413 §10.3.2).
              value_hex:
                type: string
                description: Raw open-type value bytes as hex; empty when aper discarded them.

    NASResponse:
      type: object
      properties:
        message_type:
          type: string
